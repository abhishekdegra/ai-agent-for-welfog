<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">

<script>
const chat = document.getElementById("chat");
const mainPanel = document.getElementById("mainPanel");
const deleteConfirmModal = document.getElementById("deleteConfirmModal");
const themeToggle = document.getElementById("themeToggle");
const themeIconDark = document.getElementById("themeIconDark");
const themeIconLight = document.getElementById("themeIconLight");
let currentChatId = null;
let pendingDeleteId = null;
/** True while waiting for /chat response — blocks double-send */
let chatAwaitingReply = false;
/** Voice dictation controller (mic / speech-to-text) */
let welfogVoice = null;
/** While purchase-history "View more" is loading — suppresses global Typing bubble if send() races */
window.__welfogPhAppendBusy = false;
window.__welfogWlAppendBusy = false;

const THEME_KEY = "welfog_chat_theme";

function isDesktopLayout() {
    return window.matchMedia("(min-width: 768px)").matches;
}

function applyTheme(theme) {
    const t = theme === "light" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", t);
    localStorage.setItem(THEME_KEY, t);
    if (themeIconDark && themeIconLight) {
        if (t === "light") {
            themeIconDark.removeAttribute("hidden");
            themeIconLight.setAttribute("hidden", "");
        } else {
            themeIconDark.setAttribute("hidden", "");
            themeIconLight.removeAttribute("hidden");
        }
    }
}

function initTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === "light" || saved === "dark") {
        applyTheme(saved);
    } else {
        applyTheme("dark");
    }
}

function enterChatMode() {
    if (!mainPanel) return;
    mainPanel.classList.remove("state-landing");
    mainPanel.classList.add("state-chat");
}

function enterLandingMode() {
    if (!mainPanel) return;
    mainPanel.classList.add("state-landing");
    mainPanel.classList.remove("state-chat");
}

async function initDesktopHistory() {
    const panel = document.getElementById("historyPanel");
    if (!isDesktopLayout()) return;
    panel.classList.add("open");
    await refreshHistoryList();
}

let resizeHistoryTimer = null;
function scheduleResizeHistorySync() {
    clearTimeout(resizeHistoryTimer);
    resizeHistoryTimer = setTimeout(async () => {
        const panel = document.getElementById("historyPanel");
        if (isDesktopLayout()) {
            panel.classList.add("open");
            await refreshHistoryList();
        } else {
            panel.classList.remove("open");
        }
    }, 200);
}

function dedupePurchaseHistoryCards(html, scrollEl) {
    const existing = new Set(
        Array.from(scrollEl.querySelectorAll(".wf-ph-card[data-ph-oid]")).map(function(el) {
            return el.getAttribute("data-ph-oid");
        }).filter(Boolean)
    );
    const wrap = document.createElement("div");
    wrap.innerHTML = html;
    const frag = document.createDocumentFragment();
    Array.from(wrap.children).forEach(function(node) {
        if (node.classList && node.classList.contains("wf-ph-card")) {
            const id = node.getAttribute("data-ph-oid");
            if (id && existing.has(id)) return;
            if (id) existing.add(id);
        }
        frag.appendChild(node);
    });
    return frag;
}

function addMessage(text, type){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerHTML = text;
    chat.appendChild(div);
    if (typeof window.welfogInitProductCarousels === "function") {
        window.welfogInitProductCarousels(div);
    }
    chat.scrollTop = chat.scrollHeight;
}

function showTyping(){
    if (window.__welfogPhAppendBusy || window.__welfogWlAppendBusy) return;
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typing";
    div.innerHTML = "Typing<span class='dot'>.</span><span class='dot'>.</span><span class='dot'>.</span>";
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function removeTyping(){
    const t = document.getElementById("typing");
    if (t) t.remove();
}

function setChatComposerLocked(locked) {
    const input = document.getElementById("chatInput");
    const btn = document.getElementById("chatSendBtn");
    const inner = document.querySelector(".composer__inner");
    // Keep typing while the bot works — only block duplicate sends.
    if (btn) {
        btn.disabled = !!locked;
    }
    if (welfogVoice && welfogVoice.setDisabled) {
        welfogVoice.setDisabled(!!locked);
    }
    if (inner) {
        inner.classList.toggle("composer__inner--locked", !!locked);
        inner.setAttribute("aria-busy", locked ? "true" : "false");
    }
}

function getChatIdFromUrl(){
    const params = new URLSearchParams(window.location.search);
    const id = params.get("chat_id");
    return id ? id : null;
}

function getUserIdFromUrl(){
    const params = new URLSearchParams(window.location.search);
    const raw = params.get("user_id");
    if (!raw) return null;
    const sanitized = raw.split(/[?&]/)[0].split("#")[0].trim();
    return sanitized || null;
}

function addUserIdToApiPath(path){
    const userId = getUserIdFromUrl();
    if (!userId) return path;
    return path + (path.includes("?") ? "&" : "?") + "user_id=" + encodeURIComponent(userId);
}

function setChatIdInUrl(chatId){
    const params = new URLSearchParams(window.location.search);
    if (chatId) {
        params.set("chat_id", String(chatId));
    } else {
        params.delete("chat_id");
    }
    const newUrl = window.location.pathname + (params.toString() ? "?" + params.toString() : "");
    window.history.replaceState({}, "", newUrl);
}

function syncHistoryActive() {
    document.querySelectorAll(".hist-item").forEach(function(el) {
        const cid = el.dataset.chatId;
        const active = currentChatId != null && cid != null && String(cid) === String(currentChatId);
        el.classList.toggle("hist-item--active", active);
    });
}

async function initializeChatFromUrl(){
    const initialId = getChatIdFromUrl();
    if (initialId) {
        await loadOldChat(initialId, true);
    }
}

async function send(){
    const input = document.getElementById("chatInput");
    if (welfogVoice && welfogVoice.stop) {
        welfogVoice.stop();
    }
    const message = input.value.trim();
    if (!message) return;
    if (chatAwaitingReply) return;

    chatAwaitingReply = true;
    setChatComposerLocked(true);

    try {
        enterChatMode();
        await new Promise(function(resolve) {
            requestAnimationFrame(function() { requestAnimationFrame(resolve); });
        });

        addMessage(message, "user");
        input.value = "";

        showTyping();

        const chatCtrl = new AbortController();
        const chatTimer = setTimeout(function() { chatCtrl.abort(); }, 95000);
        let res;
        try {
            res = await fetch(addUserIdToApiPath("/chat"), {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message, chat_id: currentChatId, user_id: getUserIdFromUrl() }),
                signal: chatCtrl.signal
            });
        } finally {
            clearTimeout(chatTimer);
        }
        if (!res.ok) {
            removeTyping();
            addMessage(
                "<div style='color:#333;line-height:1.55;'>Sorry — something went wrong on our side. Please try again in a moment.</div>",
                "bot"
            );
            chatAwaitingReply = false;
            setChatComposerLocked(false);
            return;
        }
        const data = await res.json();

        if (data.chat_id) {
            currentChatId = data.chat_id;
            setChatIdInUrl(currentChatId);
        }

        removeTyping();
        addMessage(data.data, "bot");

        chatAwaitingReply = false;
        setChatComposerLocked(false);

        if (currentChatId) {
            fetch(addUserIdToApiPath("/api/chat/unlock"), {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: currentChatId, user_id: getUserIdFromUrl() })
            }).catch(function() {});
        }

        const historyPanel = document.getElementById("historyPanel");
        if (historyPanel && historyPanel.classList.contains("open")) {
            refreshHistoryList().catch(function() {});
        } else {
            syncHistoryActive();
        }
    } catch (e) {
        removeTyping();
        chatAwaitingReply = false;
        setChatComposerLocked(false);
        if (e && e.name === "AbortError") {
            try {
                await fetch(addUserIdToApiPath("/api/chat/unlock"), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id: currentChatId, user_id: getUserIdFromUrl() })
                });
            } catch (unlockErr) { /* ignore */ }
        }
        const busyMsg = (e && e.name === "AbortError")
            ? "<div style='color:#333;line-height:1.55;'>This is taking longer than usual — your reply may still be processing. Please wait a few seconds and send the same message again if nothing appears.</div>"
            : "<div style='color:#333;line-height:1.55;'>Sorry — we could not reach the server. Please check your connection and try again in a moment.</div>";
        addMessage(busyMsg, "bot");
    }
}

if (chat) {
    async function runPurchaseHistoryMore(ev, btn, nextPage) {
        const root = btn.closest(".wf-ph-root");
        const scrollEl = root && root.querySelector(".wf-ph-scroll");
        if (!root || !scrollEl) {
            delete btn.dataset.phBusy;
            return;
        }

        window.__welfogPhAppendBusy = true;
        removeTyping();

        const labelEl = btn.querySelector(".wf-ph-more__label") || btn;
        if (!btn.dataset.phRestLabel) {
            btn.dataset.phRestLabel = (labelEl.textContent || "").trim() || "View more";
        }
        labelEl.textContent = "Loading…";
        btn.classList.add("wf-ph-more--loading");
        btn.setAttribute("aria-busy", "true");
        btn.setAttribute("aria-disabled", "true");

        chatAwaitingReply = true;
        setChatComposerLocked(true);

        try {
            const res = await fetch(addUserIdToApiPath("/chat"), {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "",
                    chat_id: currentChatId,
                    user_id: getUserIdFromUrl(),
                    purchase_history_page: parseInt(nextPage, 10)
                })
            });
            const data = await res.json();
            if (data.chat_id) {
                currentChatId = data.chat_id;
                setChatIdInUrl(currentChatId);
            }
            if (data.type === "purchase_history_append") {
                const tailInRoot = root.querySelector(".wf-ph-tail");
                const tailInScroll = scrollEl.querySelector(".wf-ph-tail");
                if (data.cards_html) {
                    const frag = dedupePurchaseHistoryCards(data.cards_html, scrollEl);
                    const insertBefore = tailInScroll || null;
                    if (frag.firstChild) {
                        if (insertBefore) {
                            insertBefore.parentNode.insertBefore(frag, insertBefore);
                        } else {
                            scrollEl.appendChild(frag);
                        }
                    }
                }
                if (tailInRoot) tailInRoot.remove();
                if (tailInScroll) tailInScroll.remove();
                var newTail = data.tail_html;
                if (newTail === undefined || newTail === null) {
                    newTail = data.footer_html;
                }
                if (newTail) {
                    root.insertAdjacentHTML("beforeend", newTail);
                }
                requestAnimationFrame(function() {
                    const tailBtn = root.querySelector(".wf-ph-more");
                    if (tailBtn && typeof tailBtn.scrollIntoView === "function") {
                        tailBtn.scrollIntoView({ block: "nearest", behavior: "smooth" });
                    }
                });
            } else if (data.data) {
                addMessage(data.data, "bot");
            }
            const historyPanel = document.getElementById("historyPanel");
            if (historyPanel && historyPanel.classList.contains("open")) {
                await refreshHistoryList();
            } else {
                syncHistoryActive();
            }
        } catch (e) {
            addMessage("Could not load more orders.", "bot");
        } finally {
            chatAwaitingReply = false;
            setChatComposerLocked(false);
            window.__welfogPhAppendBusy = false;
            delete btn.dataset.phBusy;
            if (btn.isConnected) {
                btn.classList.remove("wf-ph-more--loading");
                btn.removeAttribute("aria-busy");
                btn.removeAttribute("aria-disabled");
                const lab = btn.querySelector(".wf-ph-more__label") || btn;
                lab.textContent = btn.dataset.phRestLabel || "View more";
            }
        }
    }

    function onPurchaseHistoryMorePointerOrClick(ev) {
        const btn = ev.target.closest(".wf-ph-more");
        if (!btn || btn.classList.contains("wf-product-more") || !chat.contains(btn)) return;
        const nextPage = btn.getAttribute("data-next-page");
        if (!nextPage || !currentChatId) return;
        if (btn.dataset.phBusy === "1" || chatAwaitingReply) return;
        ev.preventDefault();
        ev.stopImmediatePropagation();
        btn.dataset.phBusy = "1";
        void runPurchaseHistoryMore(ev, btn, nextPage);
    }

    async function runProductSearchMore(ev, btn, nextPage) {
        const root = btn.closest(".wf-product-root");
        const rail = root && root.querySelector(".wf-product-rail");
        if (!root || !rail) {
            delete btn.dataset.phBusy;
            return;
        }
        window.__welfogProductAppendBusy = true;
        const labelEl = btn.querySelector(".wf-ph-more__label") || btn;
        if (!btn.dataset.phRestLabel) {
            btn.dataset.phRestLabel = (labelEl.textContent || "").trim() || "View more products";
        }
        labelEl.textContent = "Loading…";
        btn.classList.add("wf-ph-more--loading");
        chatAwaitingReply = true;
        setChatComposerLocked(true);
        try {
            const res = await fetch(addUserIdToApiPath("/chat"), {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "",
                    chat_id: currentChatId,
                    user_id: getUserIdFromUrl(),
                    product_search_page: parseInt(nextPage, 10)
                })
            });
            const data = await res.json();
            if (data.chat_id) {
                currentChatId = data.chat_id;
                setChatIdInUrl(currentChatId);
            }
            if (data.type === "product_search_append" && data.cards_html) {
                rail.insertAdjacentHTML("beforeend", data.cards_html);
                const tailOld = root.querySelector(".wf-product-tail");
                if (tailOld) tailOld.remove();
                if (data.tail_html) {
                    root.insertAdjacentHTML("beforeend", data.tail_html);
                }
                if (typeof window.welfogInitProductCarousels === "function") {
                    window.welfogInitProductCarousels(root);
                }
            } else if (data.data) {
                addMessage(data.data, "bot");
            }
        } catch (e) {
            addMessage("Could not load more products.", "bot");
        } finally {
            chatAwaitingReply = false;
            setChatComposerLocked(false);
            window.__welfogProductAppendBusy = false;
            delete btn.dataset.phBusy;
            if (btn.isConnected) {
                btn.classList.remove("wf-ph-more--loading");
                const lab = btn.querySelector(".wf-ph-more__label") || btn;
                lab.textContent = btn.dataset.phRestLabel || "View more products";
            }
        }
    }

    function onProductSearchMorePointerOrClick(ev) {
        const btn = ev.target.closest(".wf-product-more");
        if (!btn || !chat.contains(btn)) return;
        if (btn.tagName === "A" && btn.getAttribute("href")) return;
        const nextPage = btn.getAttribute("data-next-product-page");
        if (!nextPage || !currentChatId) return;
        if (btn.dataset.phBusy === "1" || chatAwaitingReply) return;
        ev.preventDefault();
        ev.stopImmediatePropagation();
        btn.dataset.phBusy = "1";
        void runProductSearchMore(ev, btn, nextPage);
    }

    /* capture:true — runs early; pointerdown updates UI immediately on touch */
    async function runWishlistMore(ev, btn, nextPage) {
        const root = btn.closest(".wf-wl-root");
        const scrollEl = root && root.querySelector(".wf-wl-scroll");
        if (!root || !scrollEl) {
            delete btn.dataset.wlBusy;
            return;
        }
        window.__welfogWlAppendBusy = true;
        removeTyping();
        const labelEl = btn.querySelector(".wf-wl-more__label") || btn;
        if (!btn.dataset.wlRestLabel) {
            btn.dataset.wlRestLabel = (labelEl.textContent || "").trim() || "View more";
        }
        labelEl.textContent = "Loading…";
        btn.classList.add("wf-wl-more--loading");
        btn.setAttribute("aria-busy", "true");
        btn.setAttribute("aria-disabled", "true");
        chatAwaitingReply = true;
        setChatComposerLocked(true);
        try {
            const res = await fetch(addUserIdToApiPath("/chat"), {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "",
                    chat_id: currentChatId,
                    user_id: getUserIdFromUrl(),
                    wishlist_page: parseInt(nextPage, 10)
                })
            });
            const data = await res.json();
            if (data.chat_id) {
                currentChatId = data.chat_id;
                setChatIdInUrl(currentChatId);
            }
            if (data.type === "wishlist_append") {
                const tail = scrollEl.querySelector(".wf-wl-tail");
                if (data.cards_html && tail) {
                    const frag = dedupeWishlistCards(data.cards_html, scrollEl);
                    if (frag.firstChild) tail.parentNode.insertBefore(frag, tail);
                } else if (data.cards_html && !tail) {
                    const frag = dedupeWishlistCards(data.cards_html, scrollEl);
                    if (frag.firstChild) scrollEl.appendChild(frag);
                }
                const tailOld = scrollEl.querySelector(".wf-wl-tail");
                if (tailOld) tailOld.remove();
                if (data.tail_html) scrollEl.insertAdjacentHTML("beforeend", data.tail_html);
                requestAnimationFrame(function() {
                    scrollEl.scrollTop = scrollEl.scrollHeight;
                });
            } else if (data.data) {
                addMessage(data.data, "bot");
            }
        } catch (e) {
            addMessage("Could not load more wishlist items.", "bot");
        } finally {
            chatAwaitingReply = false;
            setChatComposerLocked(false);
            window.__welfogWlAppendBusy = false;
            delete btn.dataset.wlBusy;
            if (btn.isConnected) {
                btn.classList.remove("wf-wl-more--loading");
                btn.removeAttribute("aria-busy");
                btn.removeAttribute("aria-disabled");
                const lab = btn.querySelector(".wf-wl-more__label") || btn;
                lab.textContent = btn.dataset.wlRestLabel || "View more";
            }
        }
    }

    function dedupeWishlistCards(html, scrollEl) {
        const existing = new Set(
            Array.from(scrollEl.querySelectorAll(".wf-wl-card[data-wl-pid]")).map(function(el) {
                return el.getAttribute("data-wl-pid");
            })
        );
        const wrap = document.createElement("div");
        wrap.innerHTML = html;
        const frag = document.createDocumentFragment();
        wrap.querySelectorAll(".wf-wl-card").forEach(function(node) {
            const pid = node.getAttribute("data-wl-pid");
            if (pid && existing.has(pid)) return;
            if (pid) existing.add(pid);
            frag.appendChild(node);
        });
        return frag;
    }

    function onWishlistMorePointerOrClick(ev) {
        const btn = ev.target.closest(".wf-wl-more");
        if (!btn || btn.classList.contains("wf-wl-more--page") || !chat.contains(btn)) return;
        const nextPage = btn.getAttribute("data-next-page");
        if (!nextPage || !currentChatId) return;
        if (btn.dataset.wlBusy === "1" || chatAwaitingReply) return;
        ev.preventDefault();
        ev.stopImmediatePropagation();
        btn.dataset.wlBusy = "1";
        void runWishlistMore(ev, btn, nextPage);
    }

    function getChatContentBottomInset() {
        const composer = document.querySelector(".composer");
        const h = composer ? composer.getBoundingClientRect().height : 72;
        return Math.round(h + 12);
    }

    function scrollPurchaseHistoryTrackIntoView(card, panel) {
        if (!card || !panel || !chat) return;
        const anchor = panel.querySelector(".wf-ph-track-panel-title") || panel;
        const motion = window.matchMedia("(prefers-reduced-motion: reduce)").matches ? "auto" : "smooth";
        const padding = 36;
        const nudge = 112;

        function revealInContainer(container, visibleTop, visibleBottom) {
            if (!container) return false;
            const rect = anchor.getBoundingClientRect();
            let delta = 0;
            if (rect.top < visibleTop) {
                delta = rect.top - visibleTop;
            } else if (rect.bottom > visibleBottom) {
                delta = rect.bottom - visibleBottom + padding;
            } else if (rect.top > visibleBottom - 128) {
                delta = nudge + Math.max(0, rect.bottom - visibleBottom);
            }
            if (Math.abs(delta) < 3) return false;
            container.scrollBy({ top: delta, behavior: motion });
            return true;
        }

        requestAnimationFrame(function() {
            requestAnimationFrame(function() {
                const phScroll = card.closest(".wf-ph-scroll");
                if (phScroll) {
                    const box = phScroll.getBoundingClientRect();
                    revealInContainer(phScroll, box.top + 8, box.bottom - 8);
                }

                window.setTimeout(function() {
                    const chatRect = chat.getBoundingClientRect();
                    const visibleBottom = Math.min(
                        chatRect.bottom,
                        window.innerHeight - getChatContentBottomInset()
                    );
                    revealInContainer(chat, chatRect.top + 10, visibleBottom);
                    if (window.matchMedia("(max-width: 767px)").matches) {
                        anchor.scrollIntoView({ block: "center", inline: "nearest", behavior: motion });
                    }
                }, phScroll ? 60 : 0);
            });
        });
    }

    function onPurchaseHistoryTrackToggle(ev) {
        const btn = ev.target.closest(".wf-ph-track-btn");
        if (!btn || !chat.contains(btn)) return;
        ev.preventDefault();
        ev.stopPropagation();
        const card = btn.closest(".wf-ph-card");
        const panel = card && card.querySelector(".wf-ph-track-panel");
        if (!card || !panel) return;
        const open = !card.classList.contains("wf-ph-card--track-open");
        card.classList.toggle("wf-ph-card--track-open", open);
        panel.hidden = !open;
        btn.setAttribute("aria-expanded", open ? "true" : "false");
        btn.textContent = open ? "Hide tracking" : "Track order";
        if (open) {
            scrollPurchaseHistoryTrackIntoView(card, panel);
        }
    }

    chat.addEventListener("pointerdown", onPurchaseHistoryMorePointerOrClick, true);
    chat.addEventListener("click", onPurchaseHistoryMorePointerOrClick, true);
    chat.addEventListener("click", onPurchaseHistoryTrackToggle, true);
    chat.addEventListener("pointerdown", onProductSearchMorePointerOrClick, true);
    chat.addEventListener("click", onProductSearchMorePointerOrClick, true);
    chat.addEventListener("pointerdown", onWishlistMorePointerOrClick, true);
    chat.addEventListener("click", onWishlistMorePointerOrClick, true);
}

async function newChat() {
    chatAwaitingReply = false;
    setChatComposerLocked(false);
    chat.innerHTML = "";
    currentChatId = null;
    setChatIdInUrl(null);
    enterLandingMode();
    try {
        await fetch(addUserIdToApiPath("/api/chat/unlock"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chat_id: null, user_id: getUserIdFromUrl() })
        });
    } catch (e) { /* ignore */ }
    await fetch(addUserIdToApiPath("/api/chat/new"), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: getUserIdFromUrl() })
    });
    const panel = document.getElementById("historyPanel");
    if (isDesktopLayout()) {
        panel.classList.add("open");
        await refreshHistoryList();
    } else {
        panel.classList.remove("open");
    }
}

async function refreshHistoryList() {
    const list = document.getElementById("historyList");
    if (!list) return;
    list.innerHTML = "<div class=\"hist-placeholder\">Loading…</div>";
    const ctrl = new AbortController();
    const timer = setTimeout(function() { ctrl.abort(); }, 8000);
    let chats = [];
    try {
        const res = await fetch(addUserIdToApiPath("/api/chats"), { signal: ctrl.signal });
        chats = await res.json();
    } catch (e) {
        list.innerHTML = "<div class=\"hist-placeholder\">No recent chats</div>";
        return;
    } finally {
        clearTimeout(timer);
    }
    list.innerHTML = "";
    if (chats.length === 0) {
        list.innerHTML = "<div class=\"hist-placeholder\">No recent chats</div>";
        return;
    }
    chats.forEach(c => {
        const div = document.createElement("div");
        div.className = "hist-item";
        div.dataset.chatId = String(c.chat_id);
        div.onclick = () => loadOldChat(c.chat_id);

        const row = document.createElement("div");
        row.className = "hist-item-row";

        const body = document.createElement("div");
        body.className = "hist-item-body";
        const title = document.createElement("div");
        title.className = "hist-title";
        title.textContent = c.title;
        const date = document.createElement("div");
        date.className = "hist-date";
        date.textContent = c.date_str;
        body.appendChild(title);
        body.appendChild(date);

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "hist-delete";
        deleteBtn.title = "Delete this chat";
        deleteBtn.innerHTML = "<i class='fas fa-trash'></i>";
        deleteBtn.onclick = async function(event) {
            event.stopPropagation();
            await deleteChat(c.chat_id);
        };

        row.appendChild(body);
        row.appendChild(deleteBtn);
        div.appendChild(row);
        list.appendChild(div);
    });
    syncHistoryActive();
}

async function toggleHistory() {
    const panel = document.getElementById("historyPanel");
    if (!panel) return;
    panel.classList.toggle("open");
    if (panel.classList.contains("open")) {
        try {
            await refreshHistoryList();
        } catch (e) {
            console.error(e);
        }
    }
}

async function loadOldChat(id, skipUrlUpdate = false) {
    chatAwaitingReply = false;
    setChatComposerLocked(false);
    chat.innerHTML = "";
    currentChatId = id;
    if (!skipUrlUpdate) {
        setChatIdInUrl(id);
    }
    const panel = document.getElementById("historyPanel");
    if (!isDesktopLayout()) {
        panel.classList.remove("open");
    }

    const res = await fetch(addUserIdToApiPath(`/api/chat/messages/${id}`));
    const data = await res.json();

    if (!res.ok || data.error || !Array.isArray(data) || data.length === 0) {
        currentChatId = null;
        setChatIdInUrl(null);
        chat.innerHTML = "";
        enterChatMode();
        addMessage("No chat found. Start a new conversation.", "bot");
        syncHistoryActive();
        return;
    }

    enterChatMode();
    data.forEach(m => {
        addMessage(m.message, m.sender === "user" ? "user" : "bot");
    });
    chat.scrollTop = chat.scrollHeight;
    syncHistoryActive();
}

function showDeleteModal(id) {
    pendingDeleteId = id;
    deleteConfirmModal.classList.add("show");
}

function hideDeleteModal() {
    pendingDeleteId = null;
    deleteConfirmModal.classList.remove("show");
}

async function confirmDeleteChat() {
    if (!pendingDeleteId) return;
    const deleteId = pendingDeleteId;
    hideDeleteModal();
    const res = await fetch(addUserIdToApiPath(`/api/chat/delete/${deleteId}`), { method: "DELETE" });
    const data = await res.json();
    if (!res.ok) {
        enterChatMode();
        addMessage(data.message || "Unable to delete chat.", "bot");
        pendingDeleteId = null;
        return;
    }
    if (currentChatId === deleteId) {
        currentChatId = null;
        setChatIdInUrl(null);
        chat.innerHTML = "";
        enterLandingMode();
    }
    pendingDeleteId = null;
    await refreshHistoryList();
}

async function deleteChat(id) {
    showDeleteModal(id);
}

document.getElementById("chatInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (chatAwaitingReply) return;
        send();
    }
});

if (themeToggle) {
    themeToggle.addEventListener("click", function() {
        const cur = document.documentElement.getAttribute("data-theme") || "dark";
        applyTheme(cur === "dark" ? "light" : "dark");
    });
}

window.addEventListener("resize", scheduleResizeHistorySync);

window.addEventListener("DOMContentLoaded", async () => {
    initTheme();
    if (typeof initWelfogVoiceDictation === "function") {
        welfogVoice = initWelfogVoiceDictation({
            isLocked: function () { return chatAwaitingReply; },
            transcribeUrl: function () { return addUserIdToApiPath("/api/voice/transcribe"); }
        });
    }
    await initDesktopHistory();
    await initializeChatFromUrl();
});
</script>
